<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Super Star Agency</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

  <div class="login-card">

    <!-- LOGO -->
    <img src="assets/logo.png" class="login-logo" alt="Super Star Agency Logo">

    <!-- TITLE -->
    <h2 class="brand-title">Reset Password</h2>
    <p class="page-subtitle">
      Enter your registered email and set a new password.
    </p>

    <!-- INPUTS -->
    <input id="email" type="email" placeholder="Registered Email">
    
    <div class="password-input-wrapper">
      <input id="newPassword" type="password" placeholder="New Password">
      <button type="button" class="password-toggle" onclick="togglePassword('newPassword')" aria-label="Show password" aria-pressed="false" title="Show password">
        <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>

    <!-- BUTTON -->
    <button class="primary-btn" onclick="resetPassword()">
      Reset Password
    </button>

    <!-- BACK LINK -->
    <a href="login.html" class="forgot-link">
      ← Back to Login
    </a>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="modalTitle">Message</h3>
      <p id="modalMsg"></p>

      <div class="modal-actions">
        <button class="primary-btn" onclick="closeModal()">OK</button>
      </div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const API_BASE = "https://superstaragencies.in/backend";

    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      const button = input.parentNode.querySelector('.password-toggle');
      const icon = button.querySelector('.eye-icon');
      const isHidden = input.type === 'password';

      if (isHidden) {
        input.type = 'text';
        button.setAttribute('aria-pressed', 'true');
        button.setAttribute('aria-label', 'Hide password');
        button.title = 'Hide password';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        button.setAttribute('aria-pressed', 'false');
        button.setAttribute('aria-label', 'Show password');
        button.title = 'Show password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    async function resetPassword() {
      const email = document.getElementById("email").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();

      if (!email || !newPassword) {
        showModal("Reset Error", "All fields are required.");
        return;
      }

      // Basic email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showModal("Invalid Email", "Please enter a valid email address.");
        return;
      }

      // Basic password validation
      if (newPassword.length < 6) {
        showModal("Weak Password", "Password must be at least 6 characters long.");
        return;
      }

      try {
        const res = await fetch(API_BASE + "/api/admin/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: email,
            new_password: newPassword
          })
        });

        if (!res.ok) {
          const ct = (res.headers.get('content-type') || '').toLowerCase();
          if (ct.includes('application/json')) {
            try {
              const err = await res.json();
              showModal("Reset Failed", err.message || "Unable to reset password. Please verify your email and try again.");
            } catch (e) {
              showModal("Reset Failed", "Unable to reset password. Please verify your email and try again.");
            }
          } else {
            showModal("Reset Failed", "Server returned an unexpected response. Please try again later.");
          }
          return;
        }

        const ct = (res.headers.get('content-type') || '').toLowerCase();
        if (!ct.includes('application/json')) {
          showModal("Server Error", "Unexpected server response. Please try again later.");
          return;
        }

        let data;
        try {
          data = await res.json();
        } catch (e) {
          console.error('Failed to parse JSON:', e);
          showModal("Server Error", "Unable to parse server response. Please try again.");
          return;
        }

        if (data.success || data.message) {
          showModal("Success", data.message || "Password reset successful! Redirecting to login...");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
        } else {
          showModal("Reset Failed", data.message || "Unable to reset password. Please verify your email and try again.");
        }

      } catch (err) {
        console.error("Reset password error:", err);
        showModal("Network Error", "Server unreachable");
      }
    }

    function showModal(title, message) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalMsg").textContent = message;
      const modal = document.getElementById("modal");
      modal.classList.remove("hidden");
      const btn = modal.querySelector('.modal-actions button');
      if (btn) btn.focus();
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    // ENTER KEY SUPPORT
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") resetPassword();
    });
  </script>

</body>
</html>
